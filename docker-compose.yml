services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: hanimo-rag
      POSTGRES_USER: hanimo-rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hanimo-rag}
    ports:
      - "${PG_PORT:-5439}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hanimo-rag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # hanimo-rag server
  hanimo-rag:
    build: .
    ports:
      - "${HANIMO_RAG_PORT:-8009}:8000"
    environment:
      HANIMO_RAG_POSTGRES_URI: postgresql://hanimo-rag:${POSTGRES_PASSWORD:-hanimo-rag}@postgres:5432/hanimo-rag
      HANIMO_RAG_API_KEYS: ${HANIMO_RAG_API_KEYS:-}
      HANIMO_RAG_EMBEDDING_PROVIDER: ${HANIMO_RAG_EMBEDDING_PROVIDER:-ollama}
      HANIMO_RAG_EMBEDDING_MODEL: ${HANIMO_RAG_EMBEDDING_MODEL:-nomic-embed-text}
      # host.docker.internal = host machine's localhost (for local Ollama)
      HANIMO_RAG_OLLAMA_BASE_URL: http://host.docker.internal:11434
      HANIMO_RAG_OPENAI_API_KEY: ${HANIMO_RAG_OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "python -c 'import asyncio; from hanimo_rag.db import init_schema; asyncio.run(init_schema())' &&
             uvicorn hanimo_rag.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

volumes:
  pgdata:

# Ports:
#   PostgreSQL: 5439 (avoids conflict with default 5432)
#   hanimo-rag:   8009 (avoids conflict with default 8000)
#   Ollama:     uses host machine's Ollama at 11434 (not containerized)
#
# Usage:
#   ./start.sh                                    # One command to start everything
#   docker compose up -d                          # Start PostgreSQL + hanimo-rag
#   docker compose logs -f hanimo-rag               # View logs
#   docker compose down                           # Stop all
#   docker compose down -v                        # Stop + delete data
