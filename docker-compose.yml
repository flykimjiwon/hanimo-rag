services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: modolrag
      POSTGRES_USER: modolrag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modolrag}
    ports:
      - "${PG_PORT:-5439}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modolrag"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ModolRAG server
  modolrag:
    build: .
    ports:
      - "${MODOLRAG_PORT:-8009}:8000"
    environment:
      MODOLRAG_POSTGRES_URI: postgresql://modolrag:${POSTGRES_PASSWORD:-modolrag}@postgres:5432/modolrag
      MODOLRAG_API_KEYS: ${MODOLRAG_API_KEYS:-}
      MODOLRAG_EMBEDDING_PROVIDER: ${MODOLRAG_EMBEDDING_PROVIDER:-ollama}
      MODOLRAG_EMBEDDING_MODEL: ${MODOLRAG_EMBEDDING_MODEL:-nomic-embed-text}
      # host.docker.internal = host machine's localhost (for local Ollama)
      MODOLRAG_OLLAMA_BASE_URL: http://host.docker.internal:11434
      MODOLRAG_OPENAI_API_KEY: ${MODOLRAG_OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "python -c 'import asyncio; from modolrag.db import init_schema; asyncio.run(init_schema())' &&
             uvicorn modolrag.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

volumes:
  pgdata:

# Ports:
#   PostgreSQL: 5439 (avoids conflict with default 5432)
#   ModolRAG:   8009 (avoids conflict with default 8000)
#   Ollama:     uses host machine's Ollama at 11434 (not containerized)
#
# Usage:
#   ./start.sh                                    # One command to start everything
#   docker compose up -d                          # Start PostgreSQL + ModolRAG
#   docker compose logs -f modolrag               # View logs
#   docker compose down                           # Stop all
#   docker compose down -v                        # Stop + delete data
